<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pollora</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="material-icons-round header-icon">sports_esports</span>
        <h1>Pollora</h1>
      </div>
      <div class="search-wrap">
        <span class="material-icons-round search-icon">search</span>
        <input type="text" id="search" placeholder="Search..." autocomplete="off">
      </div>
      <nav id="category-nav"></nav>
    </aside>

    <div class="content">
      <main id="hack-list"></main>
    </div>

    <div id="toast" class="toast"></div>

    <div id="input-modal" class="modal-overlay hidden">
      <div class="modal">
        <h3 id="modal-title"></h3>
        <input type="text" id="modal-input" autocomplete="off">
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
          <button id="modal-run" class="btn btn-primary">Run</button>
        </div>
      </div>
    </div>
  </div>

  <script src="hacks.js"></script>
  <script src="popup.js"></script>
</body>
</html>
